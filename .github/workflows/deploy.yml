name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DreamHost via SFTP
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='.github/'
          path: ./
          remote_path: /home/${{ secrets.DREAMHOST_USERNAME }}/sebastianruiz.com/
          remote_host: ${{ secrets.DREAMHOST_HOST }}
          remote_user: ${{ secrets.DREAMHOST_USERNAME }}
          remote_key: ${{ secrets.DREAMHOST_SSH_KEY }}
          remote_key_pass: ${{ secrets.DREAMHOST_SSH_PASSPHRASE }}

      - name: Deployment Success
        run: echo "Deployed to sebastianruiz.com successfully"
