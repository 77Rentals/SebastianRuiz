name: Deploy to DreamHost

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DreamHost via SFTP (password auth)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DREAMHOST_HOST }}
          protocol: sftp
          port: 22
          username: ${{ secrets.DREAMHOST_USERNAME }}
          password: ${{ secrets.DREAMHOST_PASSWORD }}
          server-dir: /sebastianruiz.online/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**

      - name: Deployment Success
        run: echo "Deployed to sebastianruiz.online successfully"
